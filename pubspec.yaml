name: marca_gol
description: Aplicación de apuestas deportivas con sistema de pozos colectivos
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5

  # Navigation
  go_router: ^14.1.4

  # Network & Data
  dio: ^5.4.3+1
  http: ^1.2.1

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # UI Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.3

  # YouTube Player
  youtube_player_flutter: ^9.0.3

  # Web View (for Facebook Live, etc.)
  webview_flutter: ^4.10.0

  # URL Launcher
  url_launcher: ^6.2.5
  just_audio: ^0.9.44

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - shorebird.yaml
